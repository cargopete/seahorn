services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seahorn
      POSTGRES_USER: seahorn
      POSTGRES_PASSWORD: seahorn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seahorn"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.3
    environment:
      PGRST_DB_URI: postgres://seahorn:seahorn@postgres:5432/seahorn
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
